<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In Another Life</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a0033, #330066);
            color: white;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
            min-height: 100vh;
        }
        .player {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(0,0,0,0.7);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 0 40px rgba(255, 100, 255, 0.5);
        }
        h1 { font-size: 2.8em; margin-bottom: 10px; }
        iframe {
            width: 100%;
            height: 380px;
            border: none;
            border-radius: 15px;
        }
        .lyrics {
            margin-top: 30px;
            text-align: left;
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 12px;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div class="player">
        <h1>In Another Life</h1>
        <p>Katy Perry - The One That Got Away</p>
        
        <iframe src="https://www.youtube.com/embed/oXEyW4rA4Z8" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen></iframe>
        
        <div class="lyrics">
            <strong>Lyrics:</strong><br><br>
            In another life, I would be your girl<br>
            We'd keep all our promises, be us against the world<br>
            In another life, I would make you stay<br>
            So I don't have to say you were the one that got away...
        </div>
    </div>
</body>
</html>
