<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In Another Life</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a0033, #330066);
            color: white;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
        }
        .player {
            max-width: 500px;
            margin: 0 auto;
            background: rgba(0,0,0,0.6);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(170, 0, 255, 0.5);
        }
        h1 { font-size: 2.5em; margin-bottom: 10px; }
        audio { width: 100%; margin: 20px 0; }
        .lyrics { margin-top: 30px; text-align: left; line-height: 1.8; }
    </style>
</head>
<body>
    <div class="player">
        <h1>In Another Life</h1>
        <p>Dreamy Synth Version</p>
        
        <audio controls autoplay loop>
            <source src="https://files.catbox.moe/0v4r8k.wav" type="audio/wav">
            Your browser does not support the audio element.
        </audio>
        
        <div class="lyrics">
            <strong>Lyrics:</strong><br><br>
            In another life, we'd meet again<br>
            Under stars that never end<br>
            Your hand in mine, through time we'd fly<br>
            No more goodbyes, just you and I...
        </div>
    </div>
</body>
</html>
