<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In Another Life</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a0033, #330066);
            color: white;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
        }
        .player {
            max-width: 500px;
            margin: 0 auto;
            background: rgba(0,0,0,0.7);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(170, 0, 255, 0.6);
        }
        h1 { font-size: 2.8em; margin-bottom: 8px; }
        audio { width: 100%; margin: 25px 0; }
        .lyrics { margin-top: 30px; text-align: left; line-height: 1.8; font-size: 1.1em; }
    </style>
</head>
<body>
    <div class="player">
        <h1>In Another Life</h1>
        <p>Dreamy Synth Version</p>
        
        <audio id="song" controls loop style="height:50px;">
            Your browser doesn't support audio.
        </audio>
        
        <div class="lyrics">
            <strong>Lyrics:</strong><br><br>
            In another life, we'd meet again<br>
            Under stars that never end<br>
            Your hand in mine, through time we'd fly<br>
            No more goodbyes, just you and I...
        </div>
    </div>

    <script>
        const audio = document.getElementById('song');
        // Public direct audio link
        audio.src = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"; 
        audio.play().catch(() => {});
    </script>
</body>
</html>
