<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>In Another Life - Song for KSL</title>
    <style>

            padding: 0;
            background: #000;

    <div class="video-container">
        <h1 style="margin:15px 0 5px;">In Another Life</h1>
        <p style="margin:5px 0 20px; opacity:0.8;">Song for KSL</p>
        
        <iframe src="https://www.youtube.com/embed/oXEyW4rA4Z8" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen></iframe>

            In another life, I would be your girl<br>
